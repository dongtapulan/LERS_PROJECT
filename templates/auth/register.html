{% extends "base.html" %}

{% block title %}Register | LERS{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="login-card" style="max-width: 500px;"> 
        <div class="login-header">
            <h1>Create Account</h1>
            <p>Join the Lab Reservation System</p>
        </div>
        
        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 2;">
                    <label>First Name</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group" style="flex: 2;">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>M.I.</label>
                    <input type="text" name="mi" maxlength="2">
                </div>
            </div>

            <div class="form-group">
                <label>ID Number (Username)</label>
                <input type="text" name="username" placeholder="e.g. 2024-0001" required>
            </div>

            <div class="form-row" style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Role</label>
                    <select name="role" required style="width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid #e2e8f0; background: white;">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Department</label>
                    <input type="text" name="department" placeholder="e.g. IT" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            
            <button type="submit" class="btn-login">Register</button>
        </form>
        
        <div class="login-footer">
            <p>Already have an account? <a href="{{ url_for('index') }}" style="color: var(--lab-blue);">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
