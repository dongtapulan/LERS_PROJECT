{% extends "base.html" %}
{% block title %}Reset Password | LERS{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h1>New Password</h1>
            <p>Please provide a highly secure replacement password configuration for your account access.</p>
        </div>
        
        <form action="{{ url_for('reset_password', token=token) }}" method="POST" onsubmit="return validatePasswords()">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-login">Update Password</button>
        </form>
        
        <div class="login-footer">
            <a href="{{ url_for('index') }}" style="color: var(--lab-navy); text-decoration: none; font-weight: 600;">
                <i class="fas fa-arrow-left"></i> Cancel and Return
            </a>
        </div>
    </div>
</div>

<script>
function validatePasswords() {
    const pass = document.getElementById('password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    
    if (pass !== confirmPass) {
        alert("Form Error: Entry matching failed. Please verify passwords match.");
        return false;
    }
    return true;
}
</script>
{% endblock %}
