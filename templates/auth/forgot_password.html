{% extends "base.html" %}
{% block title %}Forgot Password | LERS{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h1>Reset Password</h1>
            <p>Enter your institutional username to receive a password recovery link.</p>
        </div>
        
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="form-group">
                <label for="username">Username / ID Number</label>
                <input type="text" id="username" name="username" required placeholder="e.g., 1810342">
            </div>
            <button type="submit" class="btn-login">Send Reset Link</button>
        </form>
        
        <div class="login-footer">
            <a href="{{ url_for('index') }}" style="color: var(--lab-navy); text-decoration: none; font-weight: 600;">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
